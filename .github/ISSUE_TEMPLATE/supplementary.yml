name: Supplementary Requirement
description: Non-functional requirement
labels: ["type:SR"]

body:
  - type: dropdown
    attributes:
      label: Category
      options:
        - Performance
        - Security
        - Usability
        - Reliability
        - Legal

  - type: textarea
    attributes:
      label: Requirement Statement

  - type: textarea
    attributes:
      label: Acceptance Criteria (Testable)

  - type: dropdown
    attributes:
      label: Version
      options:
        - v0.1
        - v0.5
        - v1.0

  - type: textarea
    attributes:
      label: Related Feature, or Constrained by <FEAT ID>, eg. Constrained by #56

  - type: textarea
    attributes:
      label: Derived from
